<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フレックス勤怠</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0eb;
      --surface: #fffdf9;
      --surface2: #f0ebe4;
      --border: #e8e0d6;
      --accent: #7db89a;
      --accent-light: #d4ede3;
      --accent2: #e8a87c;
      --danger: #d97a7a;
      --danger-light: #fce8e8;
      --text: #3d3530;
      --text-muted: #9e9088;
      --font-sans: 'Nunito', 'Zen Kaku Gothic New', sans-serif;
      --font-body: 'Zen Kaku Gothic New', sans-serif;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(100,80,60,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      padding: 24px 16px 80px;
    }

    /* ========== LOGIN ========== */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 28px;
    }

    .login-title {
      font-family: var(--font-sans);
      font-size: 12px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .login-logo {
      font-family: var(--font-sans);
      font-size: 34px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-box label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .login-box input {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 17px;
      letter-spacing: 0.1em;
      padding: 14px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 14px;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      width: 100%;
      box-shadow: 0 3px 10px rgba(125,184,154,0.35);
    }

    .btn-primary:hover { opacity: 0.88; box-shadow: 0 4px 14px rgba(125,184,154,0.45); }
    .btn-primary:active { transform: scale(0.98); }

    .login-note {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.7;
    }

    /* ========== MAIN APP ========== */
    #app-screen { display: none; max-width: 480px; margin: 0 auto; }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .app-logo {
      font-family: var(--font-sans);
      font-size: 19px;
      font-weight: 600;
      color: var(--accent);
    }

    .user-badge {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .user-badge:hover { background: var(--surface2); }

    /* ========== PERIOD NAV ========== */
    .period-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 20px;
      margin-bottom: 16px;
    }

    .period-label {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .period-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 14px;
      transition: color 0.2s, background 0.2s;
    }

    .period-btn:hover { color: var(--accent); background: var(--accent-light); border-color: var(--accent); }

    /* ========== GAUGE ========== */
    .gauge-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 22px;
      margin-bottom: 16px;
    }

    .gauge-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .gauge-main {
      font-family: var(--font-sans);
      font-size: clamp(20px, 7vw, 40px);
      font-weight: 600;
      line-height: 1.1;
      transition: color 0.3s;
      white-space: nowrap;
    }

    .gauge-main.positive { color: var(--accent); }
    .gauge-main.negative { color: var(--danger); }
    .gauge-main.neutral  { color: var(--text-muted); }

    .gauge-sign {
      font-size: 26px;
      margin-bottom: 4px;
      margin-right: 2px;
    }

    .gauge-unit {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .gauge-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 4px;
    }

    .progress-wrap {
      background: var(--surface2);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progress-bar {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease, background-color 0.3s;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .stat-item {
      text-align: center;
      background: var(--surface2);
      border-radius: 10px;
      padding: 10px 6px;
    }

    .stat-val {
      font-family: var(--font-sans);
      font-size: clamp(10px, 3vw, 14px);
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ========== SETTINGS ========== */
    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings-row label {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 90px;
    }

    .settings-card input[type="number"] {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      padding: 7px 6px;
      width: 58px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align: right;
    }

    .settings-card input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .settings-unit {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ========== INPUT FORM ========== */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 22px;
      margin-bottom: 16px;
    }

    .input-card-title {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 14px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .input-group label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .input-group input[type="time"],
    .input-group input[type="date"] {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      padding: 10px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .btn-add {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      padding: 12px;
      transition: background 0.2s, box-shadow 0.2s;
      width: 100%;
      margin-top: 4px;
    }

    .btn-add:hover { background: var(--accent); color: #fff; box-shadow: 0 3px 10px rgba(125,184,154,0.3); }

    .btn-bulk {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      padding: 12px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      width: 100%;
      margin-top: 8px;
    }

    .btn-bulk:hover { background: var(--border); color: var(--text); }

    /* ========== RECORDS ========== */
    .records-title {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 10px;
    }

    .record-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 13px 16px;
      margin-bottom: 8px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .record-date {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-muted);
      min-width: 50px;
    }

    .record-time {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text);
    }

    .record-hours {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      min-width: 52px;
      text-align: right;
    }

    .btn-del {
      background: none;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 15px;
      padding: 0 0 0 10px;
      transition: color 0.2s;
    }

    .btn-del:hover { color: var(--danger); }

    .empty-msg {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 28px 0;
    }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(calc(-100% - 32px));
      background: var(--text);
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      padding: 12px 20px;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: normal;
      max-width: 80vw;
      text-align: center;
      box-shadow: 0 4px 16px rgba(60,40,20,0.18);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ========== MODAL ========== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(100,80,60,0.35);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(100,80,60,0.15);
      padding: 28px;
      width: 90%;
      max-width: 320px;
    }

    .modal h3 {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-cancel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      flex: 1;
      font-family: var(--font-sans);
      font-size: 13px;
      padding: 11px;
      transition: background 0.2s;
    }

    .btn-cancel:hover { background: var(--border); }

    .btn-danger {
      background: var(--danger-light);
      border: 1px solid var(--danger);
      border-radius: 8px;
      color: var(--danger);
      cursor: pointer;
      flex: 1;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      padding: 11px;
      transition: background 0.2s;
    }

    .btn-danger:hover { background: var(--danger); color: #fff; }

    /* ========== PAID CHECK ========== */
    .paid-check-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      user-select: none;
    }

    .paid-check-label input[type="checkbox"] { display: none; }

    .paid-check-box {
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .paid-check-label input:checked + .paid-check-box {
      background: #f0a868;
      border-color: #f0a868;
    }

    .paid-check-label input:checked + .paid-check-box::after {
      content: '✓';
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .paid-check-label input:checked ~ span:last-child { color: #f0a868; font-weight: 600; }

    /* 有給バッジ */
    .cal-paid {
      font-size: clamp(8px, 2vw, 10px);
      font-weight: 700;
      color: #fff;
      background: #f0a868;
      border-radius: 4px;
      padding: 1px 4px;
      line-height: 1.4;
      white-space: nowrap;
    }

    /* ========== TABS ========== */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      flex: 1;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      padding: 12px;
      transition: background 0.2s, color 0.2s;
    }

    .tab-btn.active {
      background: var(--accent-light);
      color: var(--accent);
    }

    /* ========== CALENDAR ========== */
    .calendar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .cal-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .cal-dow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 8px 4px;
      text-align: center;
      color: var(--text-muted);
    }

    .cal-dow.sun { color: var(--danger); }
    .cal-dow.sat { color: #7aacdb; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      min-height: 56px;
      padding: 4px;
      position: relative;
    }

    .cal-cell:nth-child(7n) { border-right: none; }

    .cal-cell.empty { background: var(--bg); }
    .cal-cell.today { background: var(--accent-light); }
    .cal-cell.holiday { background: #fef0f0; }
    .cal-cell.weekend-sat { background: #f0f4fe; }

    .cal-day {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .cal-cell.today .cal-day { color: var(--accent); }
    .cal-cell.sun .cal-day,
    .cal-cell.holiday .cal-day { color: var(--danger); }
    .cal-cell.sat .cal-day { color: #7aacdb; }

    .cal-hours {
      font-family: var(--font-sans);
      font-size: clamp(8px, 2.2vw, 11px);
      font-weight: 600;
      color: var(--accent);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

<!-- ======= LOGIN ======= -->
<div id="login-screen">
  <div>
    <div class="login-title">Flex Tracker</div>
    <div class="login-logo">勤怠</div>
  </div>
  <div class="login-box">
    <label for="user-id-input">ユーザーID（半角英数8桁以内）</label>
    <input id="user-id-input" type="text" maxlength="8" placeholder="例: taro1234" autocomplete="off" spellcheck="false" />
    <button class="btn-primary" onclick="handleLogin()">ログイン / 新規作成</button>
  </div>
  <div class="login-note">IDのみで管理されます。パスワードはありません。<br>初回入力時に自動でアカウントが作成されます。</div>
</div>

<!-- ======= APP ======= -->
<div id="app-screen">
  <div class="app-header">
    <div class="app-logo">勤怠</div>
    <div class="user-badge" id="user-badge" onclick="showLogoutModal()">— ログアウト</div>
  </div>

  <!-- 月ナビ -->
  <div class="period-nav">
    <button class="period-btn" onclick="changeMonth(-1)">‹</button>
    <div class="period-label" id="period-label">—</div>
    <button class="period-btn" onclick="changeMonth(1)">›</button>
  </div>

  <!-- ゲージ -->
  <div class="gauge-card">
    <div class="gauge-row">
      <div>
        <div class="gauge-label">今日時点の過不足</div>
        <div style="display:flex; align-items:flex-end; gap:4px; margin-top:8px;">
          <div class="gauge-main" id="gauge-diff">—</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="gauge-label">進捗</div>
        <div style="font-family:var(--font-sans); font-size:24px; font-weight:600; margin-top:8px;" id="gauge-pct">—%</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-val" id="stat-actual">—</div>
        <div class="stat-lbl">実績 h</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="stat-should">—</div>
        <div class="stat-lbl">必要 h</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="stat-days">—</div>
        <div class="stat-lbl">入力日数</div>
      </div>
    </div>
    <div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--border); display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted);">
      <span>月の所定: <span id="info-required" style="color:var(--text); font-weight:500;">—</span> h</span>
      <span>今日までの平日: <span id="info-bizdays" style="color:var(--text); font-weight:500;">—</span> 日</span>
      <span>月の平日: <span id="info-total-bizdays" style="color:var(--text); font-weight:500;">—</span> 日</span>
    </div>
  </div>

  <!-- 設定 -->
  <div class="settings-card">
    <div class="settings-row">
      <label>所定労働時間</label>
      <input type="number" id="required-hours" min="1" max="300" value="160" onchange="saveSettings()" />
      <span class="settings-unit">h / 月</span>
    </div>
    <div class="settings-row">
      <label>1日の所定</label>
      <input type="number" id="daily-hours" min="1" max="24" step="0.5" value="8" onchange="saveSettings()" />
      <span class="settings-unit">h</span>
    </div>
    <div class="settings-row">
      <label>休憩時間</label>
      <input type="number" id="break-hours" min="0" max="3" step="0.5" value="1" onchange="saveSettings()" />
      <span class="settings-unit">h</span>

<script>
  // ======= CONSTANTS =======
  const FIXED_SALT = 'FLEXTRKR2024';

  // ======= STATE =======
  let currentUserId = null;
  let currentKey = null;
  let viewYear = new Date().getFullYear();
  let viewMonth = new Date().getMonth(); // 0-indexed

  // ======= SUPABASE CONFIG =======
  // ★ 以下をご自身のSupabaseプロジェクト情報に書き換えてください
  const SUPABASE_URL = 'https://twlrvqxwrqxbssesyyan.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3bHJ2cXh3cnF4YnNzZXN5eWFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MTQxMDEsImV4cCI6MjA5MjQ5MDEwMX0.KsJHYKVbCLblLD7QC28Ot-Rscxo3-vDLopwAVyru724';

  async function sbFetch(path, method = 'GET', body = null) {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': method === 'POST' ? 'return=representation' : ''
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(SUPABASE_URL + path, opts);
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  // ======= KEY GENERATION =======
  function buildKey(userId, createdDate) {
    return `${userId}_${FIXED_SALT}_${createdDate}`;
  }

  // ======= LOGIN =======
  async function handleLogin() {
    const raw = document.getElementById('user-id-input').value.trim();
    if (!raw || !/^[a-zA-Z0-9]{1,8}$/.test(raw)) {
      showToast('半角英数8桁以内で入力してください');
      return;
    }

    try {
      // ユーザー存在確認
      const existing = await sbFetch(
        `/rest/v1/users?user_id=eq.${encodeURIComponent(raw)}&select=user_id,created_date`
      );

      let createdDate;
      if (existing && existing.length > 0) {
        createdDate = existing[0].created_date;
      } else {
        // 新規登録
        createdDate = new Date().toISOString().slice(0, 10).replace(/-/g, '');
        await sbFetch('/rest/v1/users', 'POST', { user_id: raw, created_date: createdDate });
      }

      currentUserId = raw;
      currentKey = buildKey(raw, createdDate);
      sessionStorage.setItem('userId', raw);
      sessionStorage.setItem('createdDate', createdDate);
      document.getElementById('user-badge').textContent = raw + ' ›';
      showApp();
    } catch (e) {
      showToast('エラーが発生しました: ' + e.message);
    }
  }

  // ======= AUTO RESTORE =======
  function tryRestoreSession() {
    const userId = sessionStorage.getItem('userId');
    const createdDate = sessionStorage.getItem('createdDate');
    if (userId && createdDate) {
      currentUserId = userId;
      currentKey = buildKey(userId, createdDate);
      document.getElementById('user-badge').textContent = userId + ' ›';
      showApp();
      return true;
    }
    return false;
  }

  // ======= APP SHOW/HIDE =======
  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    setTodayDate();
    loadSettings();
    renderPeriod();
  }

  function setTodayDate() {
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, '0');
    const d = String(today.getDate()).padStart(2, '0');
    document.getElementById('input-date').value = `${y}-${m}-${d}`;
  }

  // ======= PERIOD NAV =======
  function changeMonth(delta) {
    viewMonth += delta;
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
    renderPeriod();
  }

  function renderPeriod() {
    document.getElementById('period-label').textContent =
      `${viewYear}年${viewMonth + 1}月`;
    loadRecords();
    if (currentTab === 'cal') renderCalendar();
  }

  // ======= SETTINGS =======
  function settingsKey() { return `settings_${currentKey}`; }

  function saveSettings() {
    const s = {
      requiredHours: parseFloat(document.getElementById('required-hours').value) || 160,
      dailyHours: parseFloat(document.getElementById('daily-hours').value) || 8,
      breakHours: parseFloat(document.getElementById('break-hours').value) || 1
    };
    localStorage.setItem(settingsKey(), JSON.stringify(s));
    updateGauge();
  }

  function loadSettings() {
    const raw = localStorage.getItem(settingsKey());
    if (raw) {
      const s = JSON.parse(raw);
      document.getElementById('required-hours').value = s.requiredHours;
      document.getElementById('daily-hours').value = s.dailyHours || 8;
      document.getElementById('break-hours').value = s.breakHours;
    }
  }

  function getSettings() {
    const raw = localStorage.getItem(settingsKey());
    if (raw) return JSON.parse(raw);
    return { requiredHours: 160, dailyHours: 8, breakHours: 1 };
  }

  // ======= RECORDS =======
  function recordsKey() {
    return `records_${currentKey}_${viewYear}_${String(viewMonth + 1).padStart(2, '0')}`;
  }

  function loadRecords() {
    renderRecords();
    updateGauge();
  }

  function getRecords() {
    const raw = localStorage.getItem(recordsKey());
    return raw ? JSON.parse(raw) : [];
  }

  function saveRecords(records) {
    localStorage.setItem(recordsKey(), JSON.stringify(records));
  }

  function addRecord() {
    const date  = document.getElementById('input-date').value;
    const isPaid = document.getElementById('input-paid').checked;
    const start = isPaid ? null : document.getElementById('input-start').value;
    const end   = isPaid ? null : document.getElementById('input-end').value;

    if (!date) { showToast('日付を入力してください'); return; }
    if (!isPaid && (!start || !end)) { showToast('開始・終了時刻を入力してください'); return; }

    const d = new Date(date);
    if (d.getFullYear() !== viewYear || d.getMonth() !== viewMonth) {
      showToast('表示中の月の日付を入力してください');
      return;
    }

    const s = getSettings();
    let workMin;
    if (isPaid) {
      workMin = s.dailyHours * 60;
    } else {
      const startMin = timeToMin(start);
      const endMin   = timeToMin(end);
      if (endMin <= startMin) { showToast('終了時刻は開始より後にしてください'); return; }
      workMin = endMin - startMin - s.breakHours * 60;
      if (workMin <= 0) { showToast('実労働時間が0以下になります'); return; }
    }

    const records = getRecords();
    if (records.some(r => r.date === date)) {
      showToast('この日はすでに登録されています。編集する場合はカレンダーからタップしてください');
      return;
    }

    records.push({ id: Date.now(), date, start, end, workMin, isPaid });
    records.sort((a, b) => a.date.localeCompare(b.date));
    saveRecords(records);
    renderRecords();
    updateGauge();
    if (currentTab === 'cal') renderCalendar();
    showToast('追加しました');
  }

  function deleteRecord(id) {
    const records = getRecords().filter(r => r.id !== id);
    saveRecords(records);
    renderRecords();
    updateGauge();
    if (currentTab === 'cal') renderCalendar();
    showToast('削除しました');
  }

  function renderRecords() {
    const list = document.getElementById('records-list');
    const records = getRecords();

    if (records.length === 0) {
      list.innerHTML = '<div class="empty-msg">記録がありません</div>';
      return;
    }

    list.innerHTML = records.map(r => {
      const hStr = r.isPaid ? '有給' : minToHm(r.workMin);
      const timeStr = r.isPaid ? '有給休暇' : `${r.start}〜${r.end}`;
      const hoursColor = r.isPaid ? 'color:#f0a868;' : '';
      const dateDisp = r.date.slice(5).replace('-', '/');
      return `
        <div class="record-item" onclick="editCalRecord('${r.date}')" style="cursor:pointer;">
          <div class="record-date">${dateDisp}</div>
          <div class="record-time">${timeStr}</div>
          <div class="record-hours" style="${hoursColor}">${hStr}</div>
          <button class="btn-del" onclick="event.stopPropagation(); deleteRecord(${r.id})">✕</button>
        </div>`;
    }).join('');
  }

  // ======= HOLIDAYS =======
  let holidayCache = {}; // { 'YYYY': Set(['YYYY-MM-DD', ...]) }

  async function fetchHolidays(year) {
    if (holidayCache[year]) return holidayCache[year];
    try {
      // 内閣府公式祝日CSV（APIキー不要）
      const res = await fetch('https://holidays-jp.github.io/api/v1/date.json');
      if (!res.ok) throw new Error();
      const data = await res.json();
      // 全年分をキャッシュに格納
      const byYear = {};
      Object.keys(data).forEach(dateStr => {
        const y = dateStr.slice(0, 4);
        if (!byYear[y]) byYear[y] = new Set();
        byYear[y].add(dateStr);
      });
      Object.keys(byYear).forEach(y => { holidayCache[y] = byYear[y]; });
      // 対象年がデータにない場合は空セット
      if (!holidayCache[year]) holidayCache[year] = new Set();
      return holidayCache[year];
    } catch {
      holidayCache[year] = new Set();
      return holidayCache[year];
    }
  }

  function isWeekend(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const w = d.getDay();
    return w === 0 || w === 6;
  }

  async function countBizDays(year, month, upToDay = null) {
    const holidays = await fetchHolidays(year);
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const limit = upToDay !== null ? Math.min(upToDay, daysInMonth) : daysInMonth;
    let count = 0;
    for (let d = 1; d <= limit; d++) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      if (!isWeekend(dateStr) && !holidays.has(dateStr)) count++;
    }
    return count;
  }

  // ======= GAUGE =======
  async function updateGauge() {
    const records = getRecords();
    const s = getSettings();

    const totalMin = records.reduce((sum, r) => sum + r.workMin, 0);
    const totalH   = totalMin / 60;

    // 今日が表示月かどうか
    const today = new Date();
    const isCurrentMonth = (today.getFullYear() === viewYear && today.getMonth() === viewMonth);
    const upToDay = isCurrentMonth ? today.getDate() : null;

    // 平日数カウント
    const bizDaysToday = await countBizDays(viewYear, viewMonth, upToDay);
    const bizDaysTotal = await countBizDays(viewYear, viewMonth, null);

    // 今日時点のあるべき時間
    const shouldH = bizDaysToday * s.dailyHours;
    const diff    = totalH - shouldH;
    const pct     = bizDaysTotal > 0
      ? Math.min(Math.round((totalH / (bizDaysTotal * s.dailyHours)) * 100), 999)
      : 0;

    const diffMin  = Math.round((totalH - shouldH) * 60);
    const diffEl = document.getElementById('gauge-diff');
    const sign   = diffMin >= 0 ? '+' : '';
    diffEl.textContent = (diffMin >= 0 ? '+' : '') + minToHm(Math.abs(diffMin)).replace(/^-/, '');
    if (diffMin < 0) diffEl.textContent = '-' + minToHm(Math.abs(diffMin));
    diffEl.className   = 'gauge-main ' + (diffMin > 0 ? 'positive' : diffMin < 0 ? 'negative' : 'neutral');

    document.getElementById('gauge-pct').textContent    = pct + '%';
    document.getElementById('stat-actual').textContent  = minToHm(Math.round(totalH * 60));
    document.getElementById('stat-should').textContent  = minToHm(Math.round(shouldH * 60));
    document.getElementById('stat-days').textContent    = records.length;
    document.getElementById('info-required').textContent     = s.requiredHours;
    document.getElementById('info-bizdays').textContent      = bizDaysToday;
    document.getElementById('info-total-bizdays').textContent = bizDaysTotal;

    const bar = document.getElementById('progress-bar');
    const barPct = bizDaysTotal > 0
      ? Math.min((totalH / (bizDaysTotal * s.dailyHours)) * 100, 100)
      : 0;
    bar.style.width = barPct + '%';
    bar.style.backgroundColor = diff >= 0 ? 'var(--accent)' : 'var(--danger)';
  }

  // ======= PAID MODE =======
  function togglePaidMode(context) {
    if (context === 'input') {
      const checked = document.getElementById('input-paid').checked;
      document.getElementById('input-time-row').style.display = checked ? 'none' : 'grid';
    } else if (context === 'bulk') {
      const checked = document.getElementById('bulk-paid').checked;
      document.getElementById('bulk-time-row').style.display = checked ? 'none' : 'flex';
    } else if (context === 'edit') {
      const checked = document.getElementById('edit-paid').checked;
      document.getElementById('edit-time-row').style.display = checked ? 'none' : 'grid';
    }
  }
  function showBulkModal() {
    // デフォルトを今月の1日〜末日にセット
    const y = viewYear;
    const m = String(viewMonth + 1).padStart(2, '0');
    const lastDay = new Date(y, viewMonth + 1, 0).getDate();
    document.getElementById('bulk-start-date').value = `${y}-${m}-01`;
    document.getElementById('bulk-end-date').value   = `${y}-${m}-${String(lastDay).padStart(2,'0')}`;
    document.getElementById('bulk-modal').classList.add('open');
  }

  function closeBulkModal() {
    document.getElementById('bulk-modal').classList.remove('open');
  }

  let overwriteResolver = null;

  function resolveOverwrite(answer) {
    document.getElementById('overwrite-modal').classList.remove('open');
    if (overwriteResolver) overwriteResolver(answer);
  }

  function askOverwrite(count) {
    return new Promise(resolve => {
      overwriteResolver = resolve;
      document.getElementById('overwrite-msg').textContent =
        `登録済みの日が${count}件含まれています。上書きしますか？スキップする場合は「いいえ」を選択してください。`;
      document.getElementById('overwrite-modal').classList.add('open');
    });
  }

  async function executeBulkRegister() {
    const startDate = document.getElementById('bulk-start-date').value;
    const endDate   = document.getElementById('bulk-end-date').value;

    const isPaid = document.getElementById('bulk-paid').checked;
    const startTime = isPaid ? null : document.getElementById('bulk-start-time').value;
    const endTime   = isPaid ? null : document.getElementById('bulk-end-time').value;

    if (!startDate || !endDate) { showToast('開始日・終了日を入力してください'); return; }
    if (!isPaid && (!startTime || !endTime)) { showToast('開始・終了時刻を入力してください'); return; }
    if (startDate > endDate) { showToast('開始日は終了日より前にしてください'); return; }

    const s = getSettings();
    let workMin;
    if (isPaid) {
      workMin = s.dailyHours * 60;
    } else {
      const startMin = timeToMin(startTime);
      const endMin   = timeToMin(endTime);
      if (endMin <= startMin) { showToast('終了時刻は開始より後にしてください'); return; }
      workMin = endMin - startMin - s.breakHours * 60;
      if (workMin <= 0) { showToast('実労働時間が0以下になります'); return; }
    }

    const holidays = await fetchHolidays(viewYear);
    closeBulkModal();

    // 対象日を収集
    const targets = [];
    const cur = new Date(startDate + 'T00:00:00');
    const end = new Date(endDate   + 'T00:00:00');
    while (cur <= end) {
      const dateStr = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
      const dow = cur.getDay();
      if (dow !== 0 && dow !== 6 && !holidays.has(dateStr) &&
          cur.getFullYear() === viewYear && cur.getMonth() === viewMonth) {
        targets.push(dateStr);
      }
      cur.setDate(cur.getDate() + 1);
    }

    let records = getRecords();
    const duplicates = targets.filter(d => records.some(r => r.date === d));

    // 重複があれば1回だけ確認
    let doOverwrite = false;
    if (duplicates.length > 0) {
      doOverwrite = await askOverwrite(duplicates.length);
    }

    let added = 0, overwritten = 0, skipped = 0;
    targets.forEach((dateStr, i) => {
      const existing = records.find(r => r.date === dateStr);
      if (existing) {
        if (doOverwrite) {
          records = records.map(r =>
            r.date === dateStr ? { ...r, start: startTime, end: endTime, workMin, isPaid } : r
          );
          overwritten++;
        } else {
          skipped++;
        }
      } else {
        records.push({ id: Date.now() + i, date: dateStr, start: startTime, end: endTime, workMin, isPaid });
        added++;
      }
    });

    records.sort((a, b) => a.date.localeCompare(b.date));
    saveRecords(records);
    renderRecords();
    updateGauge();
    if (currentTab === 'cal') renderCalendar();
    showToast(`${added}件追加・${overwritten}件上書き・${skipped}件スキップしました`);
  }
  let currentTab = 'list';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('view-list').style.display = tab === 'list' ? 'block' : 'none';
    document.getElementById('view-cal').style.display  = tab === 'cal'  ? 'block' : 'none';
    document.getElementById('tab-list').classList.toggle('active', tab === 'list');
    document.getElementById('tab-cal').classList.toggle('active', tab === 'cal');
    if (tab === 'cal') renderCalendar();
  }

  // ======= CALENDAR =======
  async function renderCalendar() {
    const grid = document.getElementById('cal-grid');
    const records = getRecords();
    const holidays = await fetchHolidays(viewYear);

    // 日付→労働時間のマップ
    const hoursMap = {};
    records.forEach(r => {
      const h = r.workMin / 60;
      hoursMap[r.date] = (hoursMap[r.date] || 0) + h;
    });

    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=日
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    let html = '';

    // 空白セル
    for (let i = 0; i < firstDay; i++) {
      html += '<div class="cal-cell empty"></div>';
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow = new Date(dateStr + 'T00:00:00').getDay();
      const isToday    = dateStr === todayStr;
      const isSun      = dow === 0;
      const isSat      = dow === 6;
      const isHoliday  = holidays.has(dateStr);
      const hasRecord  = hoursMap[dateStr] !== undefined;

      let cls = 'cal-cell';
      if (isToday)   cls += ' today';
      if (isHoliday) cls += ' holiday';
      else if (isSat) cls += ' weekend-sat';
      if (isSun)     cls += ' sun';
      else if (isSat) cls += ' sat';

      const record = records.find(r => r.date === dateStr);
      let hoursDisp = '';
      if (record) {
        hoursDisp = record.isPaid
          ? `<div class="cal-paid">有給</div>`
          : `<div class="cal-hours">${minToHm(record.workMin)}</div>`;
      }

      const clickFn = record
        ? `editCalRecord('${dateStr}')`
        : `selectCalDate('${dateStr}')`;

      html += `<div class="${cls}" onclick="${clickFn}" style="cursor:pointer;"><div class="cal-day">${d}</div>${hoursDisp}</div>`;
    }

    grid.innerHTML = html;
  }

  function editCalRecord(dateStr) {
    const records = getRecords();
    const r = records.find(rec => rec.date === dateStr);
    if (!r) return;
    document.getElementById('edit-date-label').textContent = dateStr.slice(5).replace('-', '/');
    const isPaid = r.isPaid || false;
    document.getElementById('edit-paid').checked = isPaid;
    document.getElementById('edit-time-row').style.display = isPaid ? 'none' : 'grid';
    document.getElementById('edit-start').value = r.start || '';
    document.getElementById('edit-end').value   = r.end   || '';
    document.getElementById('edit-modal').dataset.recordId = r.id;
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('open');
  }

  function saveEditRecord() {
    const id     = parseInt(document.getElementById('edit-modal').dataset.recordId);
    const isPaid = document.getElementById('edit-paid').checked;
    const start  = isPaid ? null : document.getElementById('edit-start').value;
    const end    = isPaid ? null : document.getElementById('edit-end').value;

    if (!isPaid && (!start || !end)) { showToast('開始・終了を入力してください'); return; }

    const s = getSettings();
    let workMin;
    if (isPaid) {
      workMin = s.dailyHours * 60;
    } else {
      const startMin = timeToMin(start);
      const endMin   = timeToMin(end);
      if (endMin <= startMin) { showToast('終了時刻は開始より後にしてください'); return; }
      workMin = endMin - startMin - s.breakHours * 60;
      if (workMin <= 0) { showToast('実労働時間が0以下になります'); return; }
    }

    const records = getRecords().map(r =>
      r.id === id ? { ...r, start, end, workMin, isPaid } : r
    );
    saveRecords(records);
    closeEditModal();
    renderRecords();
    updateGauge();
    renderCalendar();
    showToast('更新しました');
  }

  function selectCalDate(dateStr) {
    document.getElementById('input-date').value = dateStr;
    showToast(`${dateStr.slice(5).replace('-','/')} を選択しました`);
  }

  // ======= UTILS =======
  function timeToMin(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function minToHm(min) {
    const absMin = Math.abs(min);
    const h = Math.floor(absMin / 60);
    const m = absMin % 60;
    const sign = min < 0 ? '-' : '';
    return m > 0 ? `${sign}${h}時間${m}分` : `${sign}${h}時間`;
  }

  // ======= TOAST =======
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('show');
    clearTimeout(toastTimer);
    // 一度非表示にしてから再表示することでアニメーションをリセット
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        t.classList.add('show');
        toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
      });
    });
  }

  // ======= LOGOUT MODAL =======
  function showLogoutModal() {
    document.getElementById('logout-modal').classList.add('open');
  }

  function closeLogoutModal() {
    document.getElementById('logout-modal').classList.remove('open');
  }

  function logout() {
    currentUserId = null;
    currentKey = null;
    sessionStorage.removeItem('userId');
    sessionStorage.removeItem('createdDate');
    closeLogoutModal();
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('user-id-input').value = '';
  }
</script>

  // ページ読み込み時にセッション復元を試みる
  tryRestoreSession();
</script>
